<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Intelligent College Counseling System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Intelligent College Counseling System</p>
      <form id="loginForm">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" required placeholder="Enter your username">
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Enter your password">
        </div>
        <div class="error-msg" id="loginError">Invalid username or password.</div>
        <button type="submit" class="btn-primary" style="margin-top: 1rem;">Login</button>
      </form>
      <div class="auth-footer">
        New user? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
