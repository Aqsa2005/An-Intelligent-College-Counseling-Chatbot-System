<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Intelligent College Counseling System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Create Account</h1>
            <p class="subtitle">Join the Intelligent College Counseling System</p>
            <form id="registerForm">
                <div class="input-group">
                    <label for="regName">Name</label>
                    <input type="text" id="regName" required placeholder="Full Name">
                </div>
                <div class="input-group">
                    <label for="regCollegeId">College ID</label>
                    <input type="text" id="regCollegeId" required placeholder="e.g. 10293847">
                </div>
                <div class="input-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" required placeholder="student@college.edu">
                </div>
                <div class="input-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" required placeholder="Choose a username">
                </div>
                <div class="input-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" required placeholder="Create a password">
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 1rem;">Register</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
